<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>증바람CK 랜덤 팀</title>

<style>
:root {
  --bg-main: radial-gradient(circle at top, #020617, #000);
  --card: #0f172a;
  --border: #334155;
  --text: #e5e7eb;
  --input-bg: #020617;
}

body.light {
  --bg-main: linear-gradient(180deg, #f8fafc, #e5e7eb);
  --card: #ffffff;
  --border: #cbd5e1;
  --text: #0f172a;
  --input-bg: #ffffff;
}

body {
  font-family: Arial;
  background: var(--bg-main);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
  color: var(--text);
}

.container {
  max-width: 800px;
  width: 100%;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}

.inputs {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
}

button {
  width: 100%;
  padding: 18px;
  font-size: 20px;
  font-weight: 900;
  border-radius: 16px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
  margin: 20px 0;
}

/* 결과 표 */
.result-table {
  width: 100%;
  border-collapse: collapse;
}

.result-table th,
.result-table td {
  border: 1px solid var(--border);
  padding: 12px;
  text-align: center;
  font-weight: bold;
}

.red { background:#7f1d1d; }
.blue { background:#1e3a8a; }

.mode-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
}

/* 모바일 */
@media (max-width: 600px) {
  .inputs {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<button class="mode-toggle" onclick="toggleMode()">🌙</button>

<div class="container">

  <div class="card">
    <h3>멤버 입력 (10명)</h3>
    <div class="inputs">
      <input id="p1">
      <input id="p2">
      <input id="p3">
      <input id="p4">
      <input id="p5">
      <input id="p6">
      <input id="p7">
      <input id="p8">
      <input id="p9">
      <input id="p10">
    </div>
  </div>

  <button onclick="shuffle()">🎲 랜덤 섞기</button>

  <table class="result-table">
    <tr>
      <th class="red">레드</th>
      <th class="blue">블루</th>
    </tr>
    <tbody id="result"></tbody>
  </table>

</div>

<script>
function shuffle() {
  let players = [];

  for (let i = 1; i <= 10; i++) {
    const v = document.getElementById('p'+i).value.trim();
    if (!v) return alert('10명 입력하세요');
    players.push(v);
  }

  players.sort(() => Math.random() - 0.5);

  let html = "";
  for (let i = 0; i < 5; i++) {
    html += `
      <tr>
        <td>${players[i]}</td>
        <td>${players[i+5]}</td>
      </tr>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

function toggleMode() {
  document.body.classList.toggle('light');
}
</script>

</body>
</html>
